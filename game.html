<!DOCTYPE html>
<html>
<head>
    <title>Jogo da Jornada</title>
    <link rel="icon" href="favicon.png">
    <style>
        body { margin:0; font-family:Arial; background:#0f2027; color:white; text-align:center; }
        #game-container { position:relative; height:80vh; }
        #linha { position:absolute; bottom:50px; left:0; width:100%; height:10px; background:blue; }
        #aviao { position:absolute; bottom:55px; left:0; font-size:40px; transition:left 0.3s; }
        #pontos-container { margin-top:20px; width:80%; margin:auto; height:30px; background:#333; border-radius:15px; overflow:hidden; }
        #pontos-bar { height:100%; width:0%; background:green; text-align:center; line-height:30px; color:white; transition: width 0.3s, background 0.3s; }
        #marcador { margin-top:20px; font-size:20px; }
        #btn-pontuar { margin-top:30px; padding:15px 30px; font-size:18px; border:none; border-radius:10px; background:#00c6ff; cursor:pointer; }
        #btn-pontuar:hover { background:#00a2cc; }
        .estrela { position:absolute; font-size:25px; cursor:pointer; }
    </style>
</head>
<body>

    <h1>Jogo da Jornada</h1>
    <div id="game-container">
        <div id="linha"></div>
        <div id="aviao">✈️</div>
    </div>

    <div id="pontos-container">
        <div id="pontos-bar">0</div>
    </div>
    <div id="marcador">Pontuação: 0 | Tempo: 90s | Multiplicador: x1</div>
    <button id="btn-pontuar">Clique para Pontuar!</button>

    <script>
        let pontos = 0;
        let tempo = 90;
        let multiplicador = 1;
        let intervaloTempo = setInterval(atualizaTempo,1000);
        let btn = document.getElementById('btn-pontuar');
        let aviao = document.getElementById('aviao');
        let pontosBar = document.getElementById('pontos-bar');
        let marcador = document.getElementById('marcador');
        let gameContainer = document.getElementById('game-container');
        let estrelaTimeout;

        function atualizaTempo(){
            tempo--;
            if(tempo<=0){
                clearInterval(intervaloTempo);
                window.location.href="gameover.html?score="+pontos;
            }
            atualizaMarcador();
        }

        function atualizaMarcador(){
            marcador.innerHTML = `Pontuação: ${pontos} | Tempo: ${tempo}s | Multiplicador: x${multiplicador}`;
            let perc = Math.min(pontos/1000000*100,100);
            pontosBar.style.width = perc+"%";
            if(pontos<1000) pontosBar.style.background="green";
            else if(pontos<10000) pontosBar.style.background="yellow";
            else if(pontos<100000) pontosBar.style.background="orange";
            else if(pontos<500000) pontosBar.style.background="red";
            else pontosBar.style.background="black";

            // move o avião
            let pos = Math.min(pontos/1000000*100,100);
            aviao.style.left = `calc(${pos}% - 20px)`;
        }

        btn.onclick = function(){
            pontos += 100*multiplicador;
            if(pontos>=1000) tempo += 20;
            if(pontos>=1000000){
                alert("Você chegou no Canadá! 🇨🇦🎉");
                window.location.href="jornada.html";
            }
            btn.disabled = true;
            setTimeout(()=>{btn.disabled=false; moveBotao();},10000);
            atualizaMarcador();
        }

        function moveBotao(){
            let x = Math.random()*70;
            let y = Math.random()*50;
            btn.style.position="relative";
            btn.style.left = x+"%";
            btn.style.top = y+"px";
        }

        // gerar estrela a cada 15s
        setInterval(()=>{
            let estrela = document.createElement('div');
            estrela.className="estrela";
            estrela.style.left = Math.random()*80 + "%";
            estrela.style.top = Math.random()*50 + "px";
            estrela.innerHTML="⭐";
            gameContainer.appendChild(estrela);
            estrela.onclick=function(){
                if(multiplicador<5) multiplicador++;
                estrela.remove();
                atualizaMarcador();
            }
            setTimeout(()=>{estrela.remove();},15000);
        },15000);

        atualizaMarcador();
    </script>
</body>
</html>
