<!DOCTYPE html>
<html>
<head>
    <title>Jogo - Corrida</title>
    <link rel="icon" href="favicon.png">
    <style>
        body {
            margin: 0;
            background: #111;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
        }
        .top-bar { padding: 10px; }
        #timer { font-size: 24px; margin-bottom: 10px; }
        #score-container { width: 80%; margin: 0 auto 20px; height: 30px; background:#222; border-radius:15px; overflow:hidden; position: relative; }
        #score-bar { height:100%; width:0%; background:green; color:white; text-align:center; line-height:30px; font-weight:bold; transition: width 0.2s, background 0.5s; }
        #game-area { position: relative; height: 400px; margin: 20px auto; width: 90%; border-top:4px solid #00c6ff; display:flex; justify-content:space-between; align-items:flex-end; }
        .player { font-size: 40px; position:absolute; bottom:0; left:0; transition:left 0.1s; }
        .point-btn { font-size: 30px; padding:20px; margin-top:20px; cursor:pointer; }
        .star { position:absolute; font-size:30px; cursor:pointer; }
        #br { font-size:50px; }
        #ca { font-size:50px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="timer">Tempo: 01:30</div>
    <div id="score-container"><div id="score-bar">0</div></div>
</div>

<div id="game-area">
    <div id="br">🇧🇷</div>
    <div class="player" id="player">✈️</div>
    <div id="ca">🇨🇦</div>
</div>

<button class="point-btn" id="pointBtn">Clique para Pontos</button>

<script>
let score=0, multiplier=1;
let time=90; // segundos
let gameStarted=false;
let player=document.getElementById("player");
let scoreBar=document.getElementById("score-bar");
let timerEl=document.getElementById("timer");
let gameInterval, starInterval;

// Função para atualizar medidor de pontos
function updateScore(){
    scoreBar.innerText=score;
    let pct=Math.min(score/1000000*100,100);
    scoreBar.style.width=pct+"%";

    if(score<1000) scoreBar.style.background="green";
    else if(score<10000) scoreBar.style.background="yellow";
    else if(score<100000) scoreBar.style.background="orange";
    else if(score<500000) scoreBar.style.background="red";
    else scoreBar.style.background="black";

    let playerPos=Math.min(score/1000000*100,100);
    player.style.left=playerPos+"%";
}

// Botão de pontuar
document.getElementById("pointBtn").onclick=function(){
    if(!gameStarted) return;
    score+=10*multiplier;
    updateScore();
}

// Função da estrela
function spawnStar(){
    let star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*80+"%";
    star.style.top=Math.random()*300+"px";
    star.innerText="⭐";
    document.body.appendChild(star);
    star.onclick=function(){
        multiplier=Math.min(multiplier+1,5);
        star.remove();
    }
    setTimeout(()=>{ if(star.parentNode) star.remove(); },15000);
}

// Iniciar jogo após 10s
setTimeout(()=>{
    gameStarted=true;
    gameInterval=setInterval(()=>{
        time--;
        timerEl.innerText="Tempo: "+Math.floor(time/60).toString().padStart(2,'0')+":"+(time%60).toString().padStart(2,'0');
        if(time<=0 || score>=1000000){
            clearInterval(gameInterval);
            clearInterval(starInterval);
            if(score>=1000000) window.location.href="jornada.html";
            else window.location.href="gameover.html?score="+score;
        }
    },1000);

    // estrela a cada 15s
    starInterval=setInterval(spawnStar,15000);
},10000); // delay 10s inicial

</script>
</body>
</html>
