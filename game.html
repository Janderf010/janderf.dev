<!DOCTYPE html>
<html>
<head>
    <title>Jogo da Jornada</title>
    <link rel="icon" href="favicon.png">
    <style>
        body { margin:0; font-family:Arial; background:#0f2027; color:white; text-align:center;}
        .track { position:relative; width:90%; height:100px; background:#444; margin:50px auto; border-radius:50px;}
        .marker { position:absolute; top:20px; width:40px; height:40px; border-radius:50%; background:#0071e3; display:flex; justify-content:center; align-items:center; font-size:24px; cursor:pointer; }
        .player { position:absolute; top:-15px; width:40px; height:40px; font-size:28px; }
        .flag { position:absolute; top:-10px; width:40px; height:40px; font-size:28px; }
        .info { margin-top:20px; font-size:20px;}
        .btn { margin: 10px; padding:8px 20px; border:none; border-radius:10px; background:#00c6ff; color:black; font-size:16px; cursor:pointer; }
        .btn:hover { background:#00a2cc; }
    </style>
</head>
<body>

<h1>Jogo da Jornada</h1>

<div class="track" id="track">
    <!-- Bandeiras -->
    <div class="flag" style="left:0;">🇧🇷</div>
    <div class="flag" style="right:0;">🇨🇦</div>
    <!-- Player -->
    <div class="player" id="player" style="left:0;">🧍‍♂️</div>
</div>

<div class="info">
    Pontos: <span id="score">0</span> | Multiplicador: <span id="mult">x1</span> | Tempo: <span id="time">90</span>s
</div>

<button class="btn" onclick="window.location.href='jornada.html'">Voltar</button>

<script>
let score = 0;
let multiplier = 1;
let time = 90;
let interval = setInterval(timer,1000);
let player = document.getElementById('player');
let scoreDisplay = document.getElementById('score');
let multDisplay = document.getElementById('mult');
let timeDisplay = document.getElementById('time');
let trackWidth = document.getElementById('track').offsetWidth - 40;

function timer(){
    if(time<=0){ endGame(); return; }
    time--;
    timeDisplay.textContent = time;
}

function endGame(){
    clearInterval(interval);
    window.location.href = "gameover.html?score="+score;
}

function updatePlayer(){
    let pct = Math.min(score/1000000,1);
    player.style.left = pct*trackWidth + "px";
}

function getColor(s){
    if(s<1000) return "green";
    if(s<10000) return "yellow";
    if(s<100000) return "orange";
    if(s<500000) return "red";
    return "black";
}

// Função que cria os marcadores de pontos
function createMarker(position){
    let marker = document.createElement('div');
    marker.classList.add('marker');
    marker.style.left = position+"px";
    marker.textContent = "★";
    marker.onclick = function(){
        score += 1000*multiplier;
        multiplier = Math.min(multiplier+1,5);
        multDisplay.textContent = "x"+multiplier;
        scoreDisplay.textContent = score;
        time +=20; // tempo extra
        updatePlayer();
        marker.remove();
    };
    document.getElementById('track').appendChild(marker);
}

// criar marcadores a cada 15s
setInterval(()=>{
    let pos = Math.random()*(trackWidth-40);
    createMarker(pos);
},15000);

// clicar para ganhar pontos (opcional)
document.getElementById('track').addEventListener('click',()=>{
    score += 100;
    scoreDisplay.textContent = score;
    player.style.left = Math.min((score/1000000)*trackWidth,trackWidth)+"px";
    scoreDisplay.style.color = getColor(score);
    if(score>=1000000) alert("Chegou no Canadá! 🎉");
});
</script>

</body>
</html>
