<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conversor de Moedas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        background: #203a43;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        text-align: center;
    }

    h1 { color: #00c6ff; margin-bottom: 20px; }

    input, select {
        padding: 12px;
        margin: 10px;
        border-radius: 12px;
        border: none;
        width: 220px;
        font-size: 16px;
    }

    button {
        padding: 12px 20px;
        border-radius: 12px;
        border: none;
        background: #00c6ff;
        color: #111;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.3s;
    }

    button:hover {
        background: #00a2cc;
        transform: translateY(-2px);
    }

    #resultado {
        margin-top: 20px;
        font-size: 18px;
    }

    .voltar {
        margin-top: 30px;
        background: rgba(255,255,255,0.1);
        color: #fff;
    }

    .voltar:hover {
        background: rgba(255,255,255,0.2);
    }
</style>
</head>
<body>

<h1>💱 Conversor de Moedas</h1>

<input type="number" id="valor" placeholder="Digite o valor">

<select id="origem">
    <option value="BRL">Real (BRL)</option>
    <option value="USD">Dólar (USD)</option>
    <option value="EUR">Euro (EUR)</option>
</select>

<select id="destino">
    <option value="USD">Dólar (USD)</option>
    <option value="BRL">Real (BRL)</option>
    <option value="EUR">Euro (EUR)</option>
</select>

<br>
<button onclick="converter()">Converter</button>

<div id="resultado"></div>

<button class="voltar" onclick="window.location.href='../projetos.html'">
⬅ Voltar
</button>

<script>
const cotacoes = {
    BRL: { USD: 0.20, EUR: 0.19 },
    USD: { BRL: 5.05, EUR: 0.95 },
    EUR: { BRL: 5.30, USD: 1.05 }
};

function converter() {
    const valor = parseFloat(document.getElementById('valor').value);
    const origem = document.getElementById('origem').value;
    const destino = document.getElementById('destino').value;

    if (isNaN(valor)) {
        alert("Digite um valor válido!");
        return;
    }

    if (origem === destino) {
        document.getElementById('resultado').innerText =
        `${valor.toFixed(2)} ${destino}`;
        return;
    }

    const resultado = valor * cotacoes[origem][destino];

    document.getElementById('resultado').innerText =
    `${valor.toFixed(2)} ${origem} = ${resultado.toFixed(2)} ${destino}`;
}
</script>

</body>
</html>
