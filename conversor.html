<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conversor de Moedas</title>
<link rel="icon" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        color: #fff;
        background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        text-align: center;
    }

    .container {
        width: 100%;
        max-width: 400px;
    }

    h1 {
        color: #00c6ff;
        margin-bottom: 20px;
        font-size: clamp(24px, 6vw, 40px);
    }

    .card {
        background: rgba(255,255,255,0.05);
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        transition: all 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
        box-shadow: 0 15px 35px rgba(0,198,255,0.6);
        background: rgba(255,255,255,0.1);
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 12px;
        border: none;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 12px;
        border: none;
        background: #00c6ff;
        color: #111;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s;
    }

    button:hover {
        background: #00a2cc;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0,198,255,0.4);
    }

    #resultado {
        margin-top: 15px;
        font-size: 18px;
    }

    .voltar {
        margin-top: 20px;
        background: rgba(255,255,255,0.1);
        color: #fff;
    }

    .voltar:hover {
        background: rgba(255,255,255,0.2);
    }
</style>
</head>
<body>

<div class="container">
    <h1>💱 Conversor</h1>

    <div class="card">
        <input type="number" id="valor" placeholder="Digite o valor">

        <select id="origem">
            <option value="BRL">Real (BRL)</option>
            <option value="USD">Dólar (USD)</option>
            <option value="EUR">Euro (EUR)</option>
        </select>

        <select id="destino">
            <option value="USD">Dólar (USD)</option>
            <option value="BRL">Real (BRL)</option>
            <option value="EUR">Euro (EUR)</option>
        </select>

        <button onclick="converter()">Converter</button>

        <div id="resultado"></div>
    </div>

    <button class="voltar" onclick="window.location.href='index.html'">
        ⬅ Voltar
    </button>
</div>

<script>
const cotacoes = {
    BRL: { USD: 0.20, EUR: 0.19 },
    USD: { BRL: 5.05, EUR: 0.95 },
    EUR: { BRL: 5.30, USD: 1.05 }
};

function converter() {
    const valor = parseFloat(document.getElementById('valor').value);
    const origem = document.getElementById('origem').value;
    const destino = document.getElementById('destino').value;

    if (isNaN(valor)) {
        alert("Digite um valor válido!");
        return;
    }

    if (origem === destino) {
        document.getElementById('resultado').innerText =
            `${valor.toFixed(2)} ${destino}`;
        return;
    }

    const taxa = cotacoes[origem][destino];
    const resultado = valor * taxa;

    document.getElementById('resultado').innerText =
        `${valor.toFixed(2)} ${origem} = ${resultado.toFixed(2)} ${destino}`;
}
</script>

</body>
</html>
