<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conversor de Moedas</title>
<link rel="icon" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: linear-gradient(120deg,#0f2027,#203a43,#2c5364);
    color: white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.box {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius:20px;
    width:90%;
    max-width:400px;
}

input, select {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}

button {
    padding:10px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    font-weight:bold;
    cursor:pointer;
}

h2 { color:#00c6ff; }

</style>
</head>

<body>

<div class="box">
    <h2>💱 Conversor de Moedas</h2>

    <input type="number" id="valor" placeholder="Digite o valor">

    <select id="de"></select>
    <select id="para"></select>

    <button onclick="converter()">Converter</button>

    <h3 id="resultado"></h3>

    <br>
    <a href="projetos.html" style="color:#00c6ff;">← Voltar</a>
</div>

<script>
const url = "https://api.exchangerate-api.com/v4/latest/USD";

let moedas = [];

fetch(url)
.then(res => res.json())
.then(data => {
    moedas = Object.keys(data.rates);

    let selectDe = document.getElementById("de");
    let selectPara = document.getElementById("para");

    moedas.forEach(moeda => {
        selectDe.innerHTML += `<option>${moeda}</option>`;
        selectPara.innerHTML += `<option>${moeda}</option>`;
    });

    selectDe.value = "USD";
    selectPara.value = "BRL";
});

function converter(){
    let valor = document.getElementById("valor").value;
    let de = document.getElementById("de").value;
    let para = document.getElementById("para").value;

    fetch(`https://api.exchangerate-api.com/v4/latest/${de}`)
    .then(res => res.json())
    .then(data => {
        let taxa = data.rates[para];
        let resultado = valor * taxa;

        document.getElementById("resultado").innerText =
            `${valor} ${de} = ${resultado.toFixed(2)} ${para}`;
    });
}
</script>

</body>
</html>
