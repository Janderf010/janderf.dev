<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Skills & Habilidades</title>
    <link rel="icon" href="favicon.png">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial;
            color: #fff;
            background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
            padding: 50px;
        }
        h1 { color: #00c6ff; margin-bottom: 30px; text-align:center; }
        .skill-card {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            margin: 20px auto;
            width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
            cursor: pointer;
        }
        .skill-card:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0,198,255,0.6);
            background: rgba(255,255,255,0.1);
        }
        pre {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Skills & Habilidades</h1>

    <div class="skill-card" onclick="showHTML()">
        <h3>HTML</h3>
        <p>Clique para ver como criar a estrutura básica de uma página web.</p>
    </div>
    <div class="skill-card" onclick="showCSS()">
        <h3>CSS</h3>
        <p>Clique para aprender a estilizar sua página e dar efeitos legais.</p>
    </div>
    <div class="skill-card" onclick="showJS()">
        <h3>JavaScript</h3>
        <p>Clique para entender como tornar sua página interativa.</p>
    </div>

    <div id="output" style="margin-top:30px;"></div>

    <script>
        const output = document.getElementById('output');

        function showHTML() {
            output.innerHTML = `
                <h2>HTML Passo a Passo</h2>
                <pre>
&lt;!DOCTYPE html&gt;
&lt;html lang="pt-br"&gt;
&lt;head&gt;
    &lt;meta charset="UTF-8"&gt;
    &lt;title>Minha Página&lt;/title&gt;
&lt;/head&gt;
&lt;body&gt;
    &lt;h1&gt;Olá Mundo!&lt;/h1&gt;
    &lt;p&gt;Minha primeira página web&lt;/p&gt;
&lt;/body&gt;
&lt;/html&gt;
                </pre>
            `;
        }

        function showCSS() {
            output.innerHTML = `
                <h2>CSS Passo a Passo</h2>
                <pre>
body {
    background-color: #0f2027;
    color: #fff;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    color: #00c6ff;
    text-shadow: 0 0 5px #00c6ff;
}
                </pre>
            `;
        }

        function showJS() {
            output.innerHTML = `
                <h2>JavaScript Passo a Passo</h2>
                <pre>
console.log("Olá Mundo!");

function mostrarAlerta() {
    alert("Clicou no botão!");
}
                </pre>
            `;
        }
    </script>
</body>
</html>
