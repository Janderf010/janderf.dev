<!DOCTYPE html>
<html>
<head>
    <title>Bem-vindo</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #ffffff, #e6f0ff);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background 1s ease;
        }

        h1 {
            font-size: 60px;
            color: #111;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            background: #0071e3;
            color: white;
            font-size: 20px;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 2s forwards;
            animation-delay: 1s;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #005bb5;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div>
        <h1>Bem-vindo</h1>
        <button class="btn" onclick="window.location.href='jornada.html'">
            Começar Jornada
        </button>
    </div>
</body>
</html>
