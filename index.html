<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Janderf.dev</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Poppins', sans-serif;
    transition: 0.5s;
}

/* MODOS */
body.dark {
    background: linear-gradient(180deg, #000, #0a0a0a, #111);
    color: white;
}

body.light {
    background: linear-gradient(180deg, #e0e0e0, #cfcfcf, #bdbdbd);
    color: black;
}

/* BOTÃO */
.toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 65px;
    height: 30px;
    background: #888;
    border-radius: 50px;
    cursor: pointer;
}

.circle {
    width: 26px;
    height: 26px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 2px;
    left: 3px;
    transition: 0.3s;
}

body.dark .circle {
    left: 36px;
    background: black;
}

/* CONTAINER */
.section {
    padding: 100px 20px;
    text-align: center;
}

/* ANIMAÇÃO */
.fade {
    opacity: 0;
    transform: translateY(30px);
    transition: 1s;
}
.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* TIMELINE */
.timeline {
    margin: 60px auto;
    max-width: 1000px;
}
.points {
    display: flex;
    justify-content: space-between;
}
.item {
    text-align: center;
}
.point {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(0,198,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: float 2s infinite alternate;
}
.point-text { font-size: 13px; }

@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
}

/* CARDS */
.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}
.card {
    padding: 25px;
    width: 250px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    cursor: pointer;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 30px rgba(0,198,255,0.7);
}

/* CONVERSOR */
input, select, button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
}
button {
    background: #00c6ff;
    color: white;
}

/* FOOTER */
footer {
    padding: 30px;
    text-align: center;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">
    <div class="circle"></div>
</div>

<!-- HERO -->
<div class="section fade">
<h1>Início</h1>
<p>Guia completo para se tornar programador e viver disso</p>

<div class="timeline">
<div class="points">

<div class="item"><div class="point">🏁</div><div class="point-text">Largada</div></div>
<div class="item"><div class="point">🎯</div><div class="point-text">Objetivo</div></div>
<div class="item"><div class="point">📊</div><div class="point-text">Planejar</div></div>
<div class="item"><div class="point">📚</div><div class="point-text">Estudar</div></div>
<div class="item"><div class="point">💻</div><div class="point-text">Programar</div></div>
<div class="item"><div class="point">📈</div><div class="point-text">Progredir</div></div>
<div class="item"><div class="point">🏆</div><div class="point-text">Sucesso</div></div>

</div>
</div>
</div>

<!-- CARDS -->
<div class="section fade">
<h2>Explorar</h2>
<div class="cards">

<div class="card">Projetos 🚀</div>
<div class="card">Skills 💻</div>
<div class="card">Conteúdo 📚</div>
<div class="card">Fé ✝️</div>

</div>
</div>

<!-- SKILLS -->
<div class="section fade">
<h2>Skills</h2>
<div class="card" onclick="showHTML()">HTML</div>
<div class="card" onclick="showCSS()">CSS</div>
<div class="card" onclick="showJS()">JS</div>
<div id="output"></div>
</div>

<!-- CONVERSOR -->
<div class="section fade">
<h2>Conversor 💱</h2>

<input type="number" id="valor" placeholder="Valor">
<select id="de">
<option value="real">Real</option>
<option value="dolar">Dólar</option>
<option value="euro">Euro</option>
</select>

<select id="para">
<option value="dolar">Dólar</option>
<option value="real">Real</option>
<option value="euro">Euro</option>
</select>

<button onclick="converter()">Converter</button>

<div id="resultado"></div>
</div>

<footer>
Copyright © 2026 Janderf.dev. Todos os direitos reservados
</footer>

<script>

// DARK MODE
let modo = localStorage.getItem("modo");
document.body.className = modo === "light" ? "light" : "dark";

function toggleMode() {
    if (document.body.className === "dark") {
        document.body.className = "light";
        localStorage.setItem("modo","light");
    } else {
        document.body.className = "dark";
        localStorage.setItem("modo","dark");
    }
}

// ANIMAÇÃO
const faders = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
    faders.forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 100) {
            el.classList.add('show');
        }
    });
});

// SKILLS
function showHTML() {
document.getElementById("output").innerText = "<html>...</html>";
}
function showCSS() {
document.getElementById("output").innerText = "body { color:white; }";
}
function showJS() {
document.getElementById("output").innerText = "console.log('JS')";
}

// CONVERSOR
function converter(){
let v = document.getElementById("valor").value;
document.getElementById("resultado").innerText = v * 5;
}

</script>

</body>
</html>
