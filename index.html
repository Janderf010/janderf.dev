<!DOCTYPE html>
<html>
<head>
    <title>Site do Jander</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #ffffff, #e6f0ff);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial;
            text-align: center;
        }

        .container {
            margin-top: 150px;
        }

        h1 {
            font-size: 50px;
            color: #111;
            margin-bottom: 10px;
        }

        p {
            font-size: 28px;
            color: #555;
        }

        .emoji {
            font-size: 50px;
            margin-top: 20px;
        }

        .card {
            display: inline-block;
            padding: 30px 50px;
            background: white;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
        }

        .btn {
            margin-top: 30px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #0071e3;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .btn:hover {
            background: #005bb5;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <h1>Site do Jander</h1>
            <p>Meu plano ✈️</p>

            <div class="emoji">
                ✈️ 🇧🇷 ➡️ 🇨🇦
            </div>

            <button class="btn" onclick="alert('Bora pro Canadá! 🇨🇦🔥')">
                Começar jornada
            </button>
        </div>
    </div>

</body>
</html>
