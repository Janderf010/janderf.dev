<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Projetos</title>
<link rel="icon" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<a href="https://janderf010.github.io/janderf/projetos.html">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, sans-serif;
    color: #fff;
    background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.container {
    text-align: center;
    max-width: 500px;
}

h1 {
    color: #00c6ff;
    font-size: 32px;
    margin-bottom: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 35px rgba(0,198,255,0.6);
    background: rgba(255,255,255,0.1);
}

.card p {
    color: #ccc;
    font-size: 16px;
}

.btn {
    display: inline-block;
    margin-top: 25px;
    padding: 10px 20px;
    border-radius: 12px;
    background: #00c6ff;
    color: #111;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #00a2cc;
    transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="container">

    <h1>Projetos</h1>

    <div class="card">
        <p>Novos projetos aparecerão aqui, fique ligado! 🔥</p>
        <print> hello world</print>
    </div>

</div>

</body>
</html>
