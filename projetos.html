<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conversor de moeda</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 350px;
    text-align: center;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* BOTÃO */
button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #00c6ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* RESULTADO */
.resultado {
    margin-top: 20px;
    font-size: 18px;
}

/* GRÁFICO */
.grafico {
    margin-top: 20px;
    height: 80px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
}

.barra {
    width: 8px;
    background: #00c6ff;
    border-radius: 5px;
    animation: subir 1s ease;
}

@keyframes subir {
    from { height: 0; }
    to { height: var(--h); }
}
</style>
</head>

<body>

<div class="container">

<h2>💱 Conversor</h2>

<input type="number" id="valor" placeholder="Digite o valor">

<select id="de">
<option value="real">Real (BRL)</option>
<option value="dolar">Dólar (USD)</option>
<option value="euro">Euro (EUR)</option>
</select>

<select id="para">
<option value="dolar">Dólar (USD)</option>
<option value="real">Real (BRL)</option>
<option value="euro">Euro (EUR)</option>
</select>

<button onclick="converter()">Converter</button>

<div class="resultado" id="resultado"></div>

<div class="grafico" id="grafico"></div>

</div>

<script>

function converter() {

    let valor = document.getElementById("valor").value;
    let de = document.getElementById("de").value;
    let para = document.getElementById("para").value;

    let taxa = 1;

    // TAXAS FAKE (depois colocamos real)
    if (de === "real" && para === "dolar") taxa = 0.20;
    if (de === "real" && para === "euro") taxa = 0.18;

    if (de === "dolar" && para === "real") taxa = 5;
    if (de === "dolar" && para === "euro") taxa = 0.90;

    if (de === "euro" && para === "real") taxa = 5.5;
    if (de === "euro" && para === "dolar") taxa = 1.1;

    let resultado = valor * taxa;

    document.getElementById("resultado").innerText =
        "Resultado: " + resultado.toFixed(2);

    gerarGrafico();
}

function gerarGrafico() {
    let grafico = document.getElementById("grafico");
    grafico.innerHTML = "";

    for (let i = 0; i < 15; i++) {
        let barra = document.createElement("div");
        barra.classList.add("barra");

        let altura = Math.random() * 80 + 10;
        barra.style.setProperty("--h", altura + "px");

        grafico.appendChild(barra);
    }
}

</script>

</body>
</html>
