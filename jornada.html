<!DOCTYPE html>
<html>
<head>
    <title>Minha Jornada</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial;
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        .logo {
            width: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 45px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            margin: 20px auto;
            width: 300px;
            border-radius: 15px;
        }

        .btn {
            margin-top: 30px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #00a2cc;
        }
    </style>
</head>

<body>

    <div class="container">

        <img src="logo.png" class="logo">

        <h1>Minha Jornada 🇨🇦</h1>

        <div class="card">
            <h3>🎯 Objetivo</h3>
            <p>Ir morar no Canadá</p>
        </div>

        <div class="card">
            <h3>📚 O que estou fazendo</h3>
            <p>Aprendendo programação 💻</p>
        </div>

        <div class="card">
            <h3>🔥 Motivação</h3>
            <p>Construir um futuro melhor</p>
        </div>

        <button class="btn" onclick="window.location.href='index.html'">
            Voltar
        </button>

    </div>

</body>
</html>
