<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minha Jornada</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #1c1c1c, #2a2a72, #4e4ed1);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            margin-top: 80px;
            width: 90%;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeIn 1s forwards;
        }

        /* Timeline */
        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto 50px;
        }

        .timeline::after {
            content: '';
            position: absolute;
            width: 6px;
            background-color: #00c6ff;
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -3px;
        }

        .entry {
            padding: 20px 40px;
            position: relative;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            width: 45%;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        .entry-left {
            left: 0;
        }

        .entry-right {
            left: 55%;
        }

        .entry::before {
            content: '⚪';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #00c6ff;
            border-radius: 50%;
            top: 20px;
            transform: translateX(-50%);
        }

        .entry-left::before {
            right: -12px;
        }

        .entry-right::before {
            left: -12px;
        }

        .entry h3 {
            margin: 0 0 5px;
            font-size: 20px;
        }

        .entry p {
            margin: 0;
            font-size: 16px;
        }

        /* Button */
        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            background: #00c6ff;
            color: black;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #0099cc;
        }

        /* Animations */
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Smooth transition delay for entries */
        .entry-left { animation-delay: 0.3s; }
        .entry-right { animation-delay: 0.6s; }
    </style>
</head>

<body>

    <div class="container">
        <h1>Minha Jornada</h1>

        <div class="timeline">
            <div class="entry entry-left">
                <h3>🎯 Objetivo</h3>
                <p>Morar no Canadá aos 25 anos</p>
            </div>

            <div class="entry entry-right">
                <h3>📚 Aprendizado</h3>
                <p>Programação 💻 e francês 🇫🇷</p>
            </div>

            <div class="entry entry-left">
                <h3>🔥 Motivação</h3>
                <p>Construir um futuro incrível</p>
            </div>

            <div class="entry entry-right">
                <h3>💡 Experiências</h3>
                <p>Projetos, estudos e viagens ✈️</p>
            </div>

            <div class="entry entry-left">
                <h3>📍 Marcos da Jornada</h3>
                <p>Cada passo é importante 💪</p>
            </div>
        </div>

        <button class="btn" onclick="window.location.href='index.html'">
            Voltar
        </button>
    </div>

</body>
</html>
