<!DOCTYPE html>
<html>
<head>
    <title>Minha Jornada</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            margin-top: 80px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 20px;
        }

        .logo {
            width: 80px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 20px;
            animation: fadeIn 2s ease forwards;
        }

        .timeline {
            position: relative;
            margin: 50px 0;
            padding-left: 20px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #00c6ff;
            border-radius: 2px;
        }

        .event {
            position: relative;
            margin-bottom: 40px;
            padding-left: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideIn 1s ease forwards;
        }

        .event:nth-child(1) { animation-delay: 0.3s; }
        .event:nth-child(2) { animation-delay: 0.6s; }
        .event:nth-child(3) { animation-delay: 0.9s; }
        .event:nth-child(4) { animation-delay: 1.2s; }

        .event span {
            display: inline-block;
            width: 40px;
            height: 40px;
            background: #00c6ff;
            border-radius: 50%;
            text-align: center;
            line-height: 40px;
            margin-left: -50px;
            color: #0f2027;
            font-size: 22px;
        }

        .event h3 {
            margin: 0;
            font-size: 24px;
        }

        .event p {
            margin: 5px 0 0 0;
            font-size: 18px;
        }

        .btn {
            margin-top: 40px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: black;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00a2cc;
        }

        /* animações */
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* emojis animados */
        .emoji {
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

    </style>
</head>

<body>

    <div class="container">

        <!-- Logo do site -->
        <img src="logo.png" class="logo">

        <h1>Minha Jornada</h1>

        <div class="timeline">

            <div class="event">
                <span class="emoji">🎯</span>
                <h3>Objetivo</h3>
                <p>Morar no Canadá aos 25 anos 🇨🇦</p>
            </div>

            <div class="event">
                <span class="emoji">📚</span>
                <h3>Aprendizado</h3>
                <p>Programação 💻 e Inglês/Francês 📝</p>
            </div>

            <div class="event">
                <span class="emoji">🔥</span>
                <h3>Motivação</h3>
                <p>Construir um futuro incrível 🚀</p>
            </div>

            <div class="event">
                <span class="emoji">✨</span>
                <h3>Trilha</h3>
                <p>Linha de progresso contínuo até a viagem 🎒</p>
            </div>

        </div>

        <button class="btn" onclick="window.location.href='index.html'">
            Voltar
        </button>

    </div>

</body>
</html>
