<!DOCTYPE html>
<html>
<head>
    <title>Minha Jornada</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #ffffff, #e6f0ff);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial;
            text-align: center;
        }

        .container {
            margin-top: 120px;
        }

        .logo {
            width: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 45px;
            color: #111;
        }

        p {
            font-size: 22px;
            color: #555;
        }

        .btn {
            margin-top: 30px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #0071e3;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #005bb5;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LOGO -->
        <img src="logo.png" class="logo">

        <h1>Minha jornada pro Canadá 🇨🇦</h1>

        <p>Esse é só o começo 😏</p>

        <button class="btn" onclick="window.location.href='index.html'">
            Voltar
        </button>

    </div>

</body>
</html>
