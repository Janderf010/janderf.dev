<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conteúdo Educativo</title>
<link rel="icon" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial;
        color: #fff;
        background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
        padding: 20px;
    }
    .container { width: 100%; max-width: 800px; }
    h1 { color: #00c6ff; font-size: clamp(24px, 6vw, 50px); margin-bottom: 30px; }
    .tutorial-card {
        background: rgba(255,255,255,0.05);
        padding: 25px;
        margin: 20px auto;
        width: 90%;
        max-width: 400px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        cursor: pointer;
        transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
    }
    .tutorial-card:hover {
        transform: scale(1.05);
        box-shadow: 0 15px 35px rgba(0,198,255,0.6);
        background: rgba(255,255,255,0.1);
    }
    pre {
        background: rgba(0,0,0,0.3);
        padding: 15px;
        border-radius: 10px;
        overflow-x: auto;
        font-size: clamp(12px, 3.5vw, 14px);
        margin-top: 15px;
    }
    #output { margin-top:30px; text-align:left; }
</style>
</head>
<body>
<div class="container">
<h1>Conteúdo Educativo</h1>
<div class="tutorial-card" onclick="showGitHub()">GitHub Pages - Publicar site</div>
<div class="tutorial-card" onclick="showFavicon()">Favicon - Ícone na aba</div>
<div id="output"></div>

<script>
const output = document.getElementById('output');
function showGitHub() {
    output.innerHTML = `<h2>GitHub Pages</h2><pre>
1️⃣ Crie uma conta no GitHub.
2️⃣ Crie um repositório.
3️⃣ Faça upload dos arquivos do site.
4️⃣ Vá em Settings &gt; Pages.
5️⃣ Escolha branch main e root, clique Save.
6️⃣ Acesse: https://usuario.github.io/repositorio
</pre>`;
}
function showFavicon() {
    output.innerHTML = `<h2>Favicon</h2><pre>
1️⃣ Crie ícone PNG 32x32 ou 64x64.
2️⃣ Converta para .ico se quiser.
3️⃣ Coloque na pasta do site.
4️⃣ Adicione &lt;link rel="icon" href="favicon.ico"&gt; no &lt;head&gt;.
5️⃣ Salve e publique no GitHub Pages.
</pre>`;
}
</script>
</div>
</body>
</html>
